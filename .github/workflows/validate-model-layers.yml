name: Validate model layers

on:
  push:
    branches:
      - main
    paths:
      - "config/models_raw_data.json"
      - "helpers/*.py"
  pull_request:
    branches:
      - main
    paths:
      - "config/models_raw_data.json"
      - "helpers/*.py"
  workflow_dispatch:

jobs:
  validate-model-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate layers in models_raw_data.json
        run: python3 config/validate_models_raw_data_layers.py
