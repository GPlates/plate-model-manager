name: Validate model layers

on:
  push:
    branches:
      - main
    paths:
      - "config/models_raw_data.json"
  pull_request:
    branches:
      - main
    paths:
      - "config/models_raw_data.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-model-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip
      - name: Install runtime dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Validate layers in models_raw_data.json
        run: python3 config/validate_models_raw_data_layers.py
